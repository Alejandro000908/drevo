server {
    listen 80;
    listen [::]:80;
    
    # Reemplaza con tu dominio
    server_name drevoznanii.ru www.drevoznanii.ru;
    
    # Path donde está el export estático de Next.js
    root /var/www/drevoznanii;
    index index.html;
    
    # Logs
    access_log /var/log/nginx/drevoznanii_access.log;
    error_log /var/log/nginx/drevoznanii_error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json 
               image/svg+xml;
    
    # Cache headers for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Sitemap and robots
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }
    
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Next.js static export with trailing slash
    # Support clean URLs: /about/ instead of /about.html
    location / {
        try_files $uri $uri/ $uri.html /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

